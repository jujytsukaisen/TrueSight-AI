<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>TrueSight AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <span class="logo-bars" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </span>
        <span class="brand-name">TrueSight <b>AI</b></span>
      </div>
      <button id="lang-toggle" class="lang-toggle" type="button">العربية</button>
    </header>

    <main id="view-input" class="view">
      <button id="analyze-page-btn" class="btn btn-primary btn-block" type="button">
        <span data-i18n="analyzePage">Analyze this page</span>
      </button>

      <div class="divider"><span data-i18n="or">or paste content</span></div>

      <div class="type-toggle" role="tablist">
        <button class="type-btn active" data-type="text" type="button" data-i18n="typeText">Text</button>
        <button class="type-btn" data-type="url" type="button" data-i18n="typeUrl">Link</button>
      </div>

      <textarea
        id="content-input"
        class="content-input"
        rows="5"
        data-i18n-placeholder="placeholderText"
        placeholder="Paste an article, ad, or post…"
      ></textarea>

      <div id="error-box" class="error-box hidden"></div>

      <button id="submit-btn" class="btn btn-primary btn-block" type="button" data-i18n="submit">
        Analyze
      </button>
    </main>

    <main id="view-loading" class="view hidden">
      <div class="loading">
        <div class="spinner"></div>
        <p data-i18n="analyzing">Reading the content closely…</p>
      </div>
    </main>

    <main id="view-results" class="view hidden">
      <div id="results-mount"></div>
      <button id="reset-btn" class="btn btn-outline btn-block" type="button" data-i18n="tryAnother">
        Analyze something else
      </button>
    </main>

    <footer class="footer">
      <a id="open-site-link" href="http://localhost:5173" target="_blank" rel="noopener">
        truesight-ai · localhost
      </a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
